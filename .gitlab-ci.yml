stages:
  - build
  - deploy

variables:
  NEXUS_REGISTRY: 192.168.50.20:15001
  NEXUS_REPO: docker-hosted
  IMAGE_NAME: remizhook

# AMD64 이미지 빌드
build:amd64:
  stage: build
  image: docker:28
  services:
    - docker:28-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    PLATFORM: linux/amd64
  before_script:
    - docker login -u $NEXUS_USER -p $NEXUS_PASSWORD $NEXUS_REGISTRY
  script:
    - docker build --platform linux/amd64 -t $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:amd64-$CI_COMMIT_SHORT_SHA .
    - docker push $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:amd64-$CI_COMMIT_SHORT_SHA
    - docker tag $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:amd64-$CI_COMMIT_SHORT_SHA $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:amd64-latest
    - docker push $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:amd64-latest
  tags:
    - docker
    - amd64
  only:
    - main
    - master

# ARM64 이미지 빌드 (맥미니)
build:arm64:
  stage: build
  image: docker:28
  services:
    - docker:28-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    PLATFORM: linux/arm64
  before_script:
    - docker login -u $NEXUS_USER -p $NEXUS_PASSWORD $NEXUS_REGISTRY
  script:
    - docker build --platform linux/arm64 -t $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:arm64-$CI_COMMIT_SHORT_SHA .
    - docker push $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:arm64-$CI_COMMIT_SHORT_SHA
    - docker tag $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:arm64-$CI_COMMIT_SHORT_SHA $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:arm64-latest
    - docker push $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:arm64-latest
  tags:
    - docker
    - arm64
  only:
    - main
    - master

# Multi-arch Manifest 생성
manifest:
  stage: deploy
  image: docker:28
  services:
    - docker:28-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u $NEXUS_USER -p $NEXUS_PASSWORD $NEXUS_REGISTRY
  script:
    - docker manifest create $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:latest $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:amd64-latest $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:arm64-latest
    - docker manifest push $NEXUS_REGISTRY/$NEXUS_REPO/$IMAGE_NAME:latest
  needs:
    - build:amd64
    - build:arm64
  tags:
    - docker
    - amd64
  only:
    - main
    - master

# NAS 배포
deploy:nas:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client docker-cli
    - eval $(ssh-agent -s)
    - echo "$NAS_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no -p 22023 $NAS_USER@$NAS_HOST "cd /volume1/docker/app && docker-compose pull remizhook && docker-compose up -d --force-recreate remizhook"
  needs:
    - manifest
  tags:
    - docker
    - amd64
  only:
    - main
    - master